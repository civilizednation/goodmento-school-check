        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const STUDENTS_COL = "cnation-goodmento-students";
        const ATTENDANCE_COL = "cnation-goodmento-attendance";

        let currentSchool = "";
        let currentStudents = [];
        let manageStudentsData = [];

        document.getElementById('attDate').value = new Date().toISOString().split('T')[0];

        function generateThumbnail(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        const max_size = 200;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } }
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.goHome = () => {
            document.getElementById('attendanceView').classList.add('hidden');
            document.getElementById('manageView').classList.add('hidden');
            document.getElementById('fullReportView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        };

        window.openAttendance = (school) => {
            currentSchool = school;
            document.getElementById('attSchoolTitle').innerText = school;
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('attendanceView').classList.remove('hidden');
            loadAttendanceData();
        };

        window.openManage = () => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('manageView').classList.remove('hidden');
            loadManageStudents();
        };

        window.loadAttendanceData = async () => {
            const listContainer = document.getElementById('studentListContainer');
            const deleteSelect = document.getElementById('deleteStudentSelect');
            const editSelect = document.getElementById('editStudentSelect');
            listContainer.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin mr-2"></i>학생 목록 로드 중...</p>';
            const selectedDate = document.getElementById('attDate').value;

            try {
                const studentSnap = await getDocs(query(collection(db, STUDENTS_COL), where("school", "==", currentSchool)));
                currentStudents = [];
                studentSnap.forEach(doc => currentStudents.push({ id: doc.id, ...doc.data() }));

                const attSnap = await getDocs(query(collection(db, ATTENDANCE_COL), where("school", "==", currentSchool)));
                const todayAttendance = {};
                attSnap.forEach(doc => { if (doc.data().date === selectedDate) todayAttendance[doc.data().studentId] = doc.data(); });

                listContainer.innerHTML = ''; deleteSelect.innerHTML = '<option value="">삭제 선택</option>'; editSelect.innerHTML = '<option value="">수정 선택</option>';
                if (currentStudents.length === 0) { listContainer.innerHTML = '<p class="text-center text-gray-400 py-10">등록된 학생이 없습니다.</p>'; return; }

                currentStudents.sort((a, b) => a.number - b.number);
                currentStudents.forEach(student => {
                    const record = todayAttendance[student.id] || { status: '출석', memo: '' };
                    const opt = `<option value="${student.id}">${student.number}번 ${student.name}</option>`;
                    deleteSelect.innerHTML += opt; editSelect.innerHTML += opt;
                    let photoHtml = student.thumbnailUrl ? `<img src="${student.thumbnailUrl}" class="w-12 h-12 rounded-full object-cover shrink-0">` : `<div class="w-12 h-12 rounded-full bg-pink-50 flex items-center justify-center text-pink-300 shrink-0"><i class="fas fa-user"></i></div>`;
                    listContainer.insertAdjacentHTML('beforeend', `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100" data-student-id="${student.id}">
                            <div class="flex items-center gap-3 mb-3">
                                ${photoHtml}
                                <div class="flex-1">
                                    <div class="flex items-center gap-1.5 mb-1"><span class="text-xs font-bold text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded">${student.number}번</span><span class="font-bold text-gray-800 text-lg">${student.name}</span></div>
                                    <div class="flex bg-gray-50 rounded-lg p-1 gap-1">
                                        <label class="flex-1 text-center cursor-pointer py-1.5 rounded-md text-sm font-bold ${record.status === '출석' ? 'bg-green-500 text-white shadow-sm' : 'text-gray-500'}"><input type="radio" name="status_${student.id}" value="출석" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '출석' ? 'checked' : ''}> 출석</label>
                                        <label class="flex-1 text-center cursor-pointer py-1.5 rounded-md text-sm font-bold ${record.status === '지각' ? 'bg-orange-500 text-white shadow-sm' : 'text-gray-500'}"><input type="radio" name="status_${student.id}" value="지각" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '지각' ? 'checked' : ''}> 지각</label>
                                        <label class="flex-1 text-center cursor-pointer py-1.5 rounded-md text-sm font-bold ${record.status === '결석' ? 'bg-red-500 text-white shadow-sm' : 'text-gray-500'}"><input type="radio" name="status_${student.id}" value="결석" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '결석' ? 'checked' : ''}> 결석</label>
                                    </div>
                                </div>
                            </div>
                            <input type="text" id="memo_${student.id}" value="${record.memo}" placeholder="메모..." class="w-full border-b border-dashed border-gray-300 py-1 text-sm text-gray-600 focus:outline-none focus:border-pink-400 bg-transparent mt-1">
                        </div>
                    `);
                });
            } catch (e) { listContainer.innerHTML = '에러 발생'; }
        };

        window.updateRadioStyle = (radio) => {
            const labels = radio.closest('div').querySelectorAll('label');
            labels.forEach(l => l.className = 'flex-1 text-center cursor-pointer py-1.5 rounded-md text-sm font-bold text-gray-500');
            if (radio.value === '출석') radio.parentElement.classList.add('bg-green-500', 'text-white', 'shadow-sm');
            if (radio.value === '지각') radio.parentElement.classList.add('bg-orange-500', 'text-white', 'shadow-sm');
            if (radio.value === '결석') radio.parentElement.classList.add('bg-red-500', 'text-white', 'shadow-sm');
        };

        window.addStudent = async () => {
            const num = document.getElementById('newStudentNum').value.trim(), name = document.getElementById('newStudentName').value.trim(), photoFile = document.getElementById('newStudentPhoto').files[0];
            if (!num || !name) { alert("정보 입력 필수"); return; }
            document.getElementById('addStudentBtn').disabled = true; document.getElementById('uploadStatus').classList.remove('hidden');
            try {
                let imageUrl = "", thumbnailUrl = "";
                if (photoFile) {
                    const timeStr = Date.now(), originalRef = ref(storage, `${STUDENTS_COL}/images/${timeStr}_${photoFile.name}`);
                    await uploadBytes(originalRef, photoFile); imageUrl = await getDownloadURL(originalRef);
                    const thumbBlob = await generateThumbnail(photoFile), thumbRef = ref(storage, `${STUDENTS_COL}/thumbnails/${timeStr}_${photoFile.name}.jpg`);
                    await uploadBytes(thumbRef, thumbBlob); thumbnailUrl = await getDownloadURL(thumbRef);
                }
                await addDoc(collection(db, STUDENTS_COL), { school: currentSchool, number: Number(num), name, imageUrl, thumbnailUrl, createdAt: serverTimestamp() });
                alert("추가 완료"); loadAttendanceData();
            } catch (e) { alert("추가 실패"); } finally { document.getElementById('addStudentBtn').disabled = false; document.getElementById('uploadStatus').classList.add('hidden'); }
        };

        window.loadStudentDataForEdit = () => {
            const id = document.getElementById('editStudentSelect').value;
            const form = document.getElementById('editStudentForm');
            if (!id) { form.classList.add('hidden'); return; }
            const student = currentStudents.find(s => s.id === id);
            if (student) { document.getElementById('editStudentNum').value = student.number; document.getElementById('editStudentName').value = student.name; form.classList.remove('hidden'); }
        };

        window.updateStudent = async () => {
            const id = document.getElementById('editStudentSelect').value, num = document.getElementById('editStudentNum').value.trim(), name = document.getElementById('editStudentName').value.trim(), photoFile = document.getElementById('editStudentPhoto').files[0];
            if (!num || !name) return;
            const student = currentStudents.find(s => s.id === id);
            document.getElementById('updateStudentBtn').disabled = true; document.getElementById('editUploadStatus').classList.remove('hidden');
            try {
                let imageUrl = student.imageUrl, thumbnailUrl = student.thumbnailUrl;
                if (photoFile) {
                    const timeStr = Date.now(), originalRef = ref(storage, `${STUDENTS_COL}/images/${timeStr}_${photoFile.name}`);
                    await uploadBytes(originalRef, photoFile); imageUrl = await getDownloadURL(originalRef);
                    const thumbBlob = await generateThumbnail(photoFile), thumbRef = ref(storage, `${STUDENTS_COL}/thumbnails/${timeStr}_${photoFile.name}.jpg`);
                    await uploadBytes(thumbRef, thumbBlob); thumbnailUrl = await getDownloadURL(thumbRef);
                }
                await updateDoc(doc(db, STUDENTS_COL, id), { number: Number(num), name, imageUrl, thumbnailUrl, updatedAt: serverTimestamp() });
                alert("수정 완료"); document.getElementById('editStudentForm').classList.add('hidden'); loadAttendanceData();
            } catch (e) { alert("수정 실패"); } finally { document.getElementById('updateStudentBtn').disabled = false; document.getElementById('editUploadStatus').classList.add('hidden'); }
        };

        window.deleteStudent = async () => {
            const id = document.getElementById('deleteStudentSelect').value;
            if (!id) return;
            if (confirm("정말 삭제하시겠어요?")) { await deleteDoc(doc(db, STUDENTS_COL, id)); alert("삭제 완료"); loadAttendanceData(); }
        };

        window.saveAllAttendance = async () => {
            const date = document.getElementById('attDate').value; let count = 0;
            try {
                for (const student of currentStudents) {
                    const radio = document.querySelector(`input[name="status_${student.id}"]:checked`), memo = document.getElementById(`memo_${student.id}`).value.trim();
                    if (radio) { await setDoc(doc(db, ATTENDANCE_COL, `${currentSchool}_${student.id}_${date}`), { school: currentSchool, studentId: student.id, date, status: radio.value, memo, updatedAt: serverTimestamp() }); count++; }
                }
                alert(`${count}명 저장 완료`);
            } catch (e) { alert("저장 실패"); }
        };

        // --- 학생관리/조회 공용 로직 ---
        window.toggleCustomDate = () => { const p = document.getElementById('manPeriod').value; document.getElementById('customDateContainer').classList.toggle('hidden', p !== '기간지정'); };
        window.toggleRepCustomDate = () => { const p = document.getElementById('repPeriod').value; document.getElementById('repCustomDateContainer').classList.toggle('hidden', p !== '기간지정'); };

        window.loadManageStudents = async () => {
            const school = document.getElementById('manSchool').value;
            const select = document.getElementById('manStudent');
            if (!school) { select.innerHTML = '<option value="">학교 선택 먼저</option>'; return; }
            try {
                const snap = await getDocs(query(collection(db, STUDENTS_COL), where("school", "==", school)));
                manageStudentsData = []; snap.forEach(doc => manageStudentsData.push({ id: doc.id, ...doc.data() }));
                manageStudentsData.sort((a, b) => a.number - b.number);
                select.innerHTML = '<option value="">학생 선택</option>' + manageStudentsData.map(s => `<option value="${s.id}">${s.number}번 ${s.name}</option>`).join('');
            } catch (e) { select.innerHTML = '로드 실패'; }
        };

        function getDateRange(p, sId, eId) {
            const t = new Date(); let s, e;
            if (p === '이번주') { const day = t.getDay(); const diff = t.getDate() - day + (day === 0 ? -6 : 1); s = new Date(t.setDate(diff)); e = new Date(s); e.setDate(e.getDate() + 6); }
            else if (p === '이번달') { s = new Date(t.getFullYear(), t.getMonth(), 1); e = new Date(t.getFullYear(), t.getMonth() + 1, 0); }
            else if (p === '올해') { s = new Date(t.getFullYear(), 0, 1); e = new Date(t.getFullYear(), 11, 31); }
            else { return { start: document.getElementById(sId).value, end: document.getElementById(eId).value }; }
            const off = s.getTimezoneOffset() * 60000; return { start: (new Date(s - off)).toISOString().split('T')[0], end: (new Date(e - off)).toISOString().split('T')[0] };
        }

        window.searchAttendance = async () => {
            const sid = document.getElementById('manStudent').value, range = getDateRange(document.getElementById('manPeriod').value, 'manStartDate', 'manEndDate');
            if (!sid || !range.start || !range.end) return;
            const target = manageStudentsData.find(s => s.id === sid);
            document.getElementById('profileNumber').innerText = `NO. ${target.number}`; document.getElementById('profileName').innerText = target.name;
            document.getElementById('profileImage').innerHTML = target.imageUrl ? `<img src="${target.imageUrl}" class="w-full h-full object-cover">` : `<i class="fas fa-user text-5xl"></i>`;
            document.getElementById('studentProfileContainer').classList.remove('hidden');

            try {
                const snap = await getDocs(query(collection(db, ATTENDANCE_COL), where("studentId", "==", sid)));
                let p = 0, t = 0, a = 0, td = [], ad = [], ms = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.date >= range.start && d.date <= range.end) {
                        if (d.status === '출석') p++; else if (d.status === '지각') { t++; td.push(d.date); } else if (d.status === '결석') { a++; ad.push(d.date); }
                        if (d.memo) ms.push({ date: d.date, memo: d.memo, status: d.status });
                    }
                });
                document.getElementById('statPresent').innerText = p; document.getElementById('statTardy').innerText = t; document.getElementById('statAbsent').innerText = a;
                document.getElementById('tardyList').innerHTML = td.length ? `지각: ${td.sort().join(', ')}` : '';
                document.getElementById('absentList').innerHTML = ad.length ? `결석: ${ad.sort().join(', ')}` : '';
                document.getElementById('statDetails').classList.toggle('hidden', !td.length && !ad.length);
                document.getElementById('tardyList').classList.toggle('hidden', !td.length);
                document.getElementById('absentList').classList.toggle('hidden', !ad.length);
                document.getElementById('statContainer').classList.remove('hidden');
                ms.sort((a, b) => b.date.localeCompare(a.date));
                document.getElementById('memoContainer').innerHTML = ms.map(m => `<div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100"><div class="text-[10px] font-bold text-gray-400 mb-1">${m.date} [${m.status}]</div><div class="text-xs">${m.memo}</div></div>`).join('');
            } catch (e) { alert("조회 실패"); }
        };

        window.openFullReport = () => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('fullReportView').classList.remove('hidden');
            document.getElementById('reportTableContainer').innerHTML = '<p class="text-center text-gray-400 py-20">학교와 기간을 선택하고 조회를 눌러주세요.</p>';
        };

        window.loadFullReport = async () => {
            const school = document.getElementById('repSchool').value, range = getDateRange(document.getElementById('repPeriod').value, 'repStartDate', 'repEndDate'), container = document.getElementById('reportTableContainer');
            if (!school || !range.start || !range.end) { alert("학교/기간 선택 필수"); return; }
            container.innerHTML = '<p class="text-center text-gray-400 py-20"><i class="fas fa-spinner fa-spin"></i> 표 생성 중...</p>';

            try {
                const sSnap = await getDocs(query(collection(db, STUDENTS_COL), where("school", "==", school)));
                const students = []; sSnap.forEach(doc => students.push({ id: doc.id, ...doc.data() }));
                students.sort((a, b) => a.number - b.number);

                const aSnap = await getDocs(query(collection(db, ATTENDANCE_COL), where("school", "==", school)));
                const attData = {}, datesSet = new Set();
                aSnap.forEach(doc => {
                    const d = doc.data();
                    if (d.date >= range.start && d.date <= range.end) {
                        if (!attData[d.studentId]) attData[d.studentId] = {};
                        attData[d.studentId][d.date] = d.status;
                        datesSet.add(d.date);
                    }
                });

                const sortedDates = Array.from(datesSet).sort();
                if (!students.length) { container.innerHTML = '<p class="text-center py-20">학생 없음</p>'; return; }

                let h = '<table><thead><tr><th>번호</th><th>이름</th>' + sortedDates.map(d => `<th>${d.substring(5)}</th>`).join('') + '</tr></thead><tbody>';
                students.forEach(s => {
                    h += `<tr><td>${s.number}</td><td class="font-bold">${s.name}</td>`;
                    sortedDates.forEach(d => {
                        const status = attData[s.id]?.[d] || '-';
                        let cls = "status-none";
                        if (status === '출석') cls = "status-present";
                        else if (status === '지각') cls = "status-tardy";
                        else if (status === '결석') cls = "status-absent";
                        h += `<td class="${cls}">${status !== '-' ? status : '-'}</td>`;
                    });
                    h += '</tr>';
                });
                container.innerHTML = h + '</tbody></table>';
            } catch (e) { container.innerHTML = '조회 실패'; }
        };

    </script>
</body>

</html>
