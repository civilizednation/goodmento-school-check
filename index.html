<body class="bg-gray-100 font-sans text-gray-800 selection:bg-pink-200">

                    <div class="pt-4 border-t border-pink-200 mt-6">

        <div id="attendanceView" class="hidden flex flex-col min-h-screen bg-gray-50 pb-24">

            <div class="p-4 bg-white shadow-sm z-0 relative">

            <div id="studentListContainer" class="flex-1 p-4 space-y-4 overflow-y-auto">

            <div class="p-4 bg-white border-t border-gray-100 pb-8">
                <button onclick="saveAllAttendance()"

                            <input type="text" id="editStudentName" placeholder="이름 (필수)"

                        <div class="flex gap-2 items-center">

                                <input type="file" id="editStudentPhoto" accept="image/*"

                            <button onclick="updateStudent()" id="updateStudentBtn"

                        <p class="text-[10px] text-gray-400 mt-1 pl-1">* 사진을 변경하지 않으려면 첨부하지 마세요.</p>
                        <p id="editUploadStatus" class="text-xs text-center text-indigo-500 font-bold hidden mt-2">데이터

                <div class="mt-6 pt-6 border-t border-gray-100">
                    <h3 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-wider">학생 삭제</h3>
                    <div class="flex gap-2">
                        <select id="deleteStudentSelect"

        <div id="manageView" class="hidden flex flex-col min-h-screen bg-gray-50 pb-20">
            <div class="bg-indigo-500 text-white p-4 flex items-center justify-between shadow-md sticky top-0 z-10">
                <button onclick="goHome()" class="text-xl px-2"><i class="fas fa-arrow-left"></i></button>
                <h2 class="font-bold text-lg tracking-wide">학생 관리</h2>
                <div class="w-8"></div>
            </div>

            <div class="p-5 bg-white shadow-sm border-b border-gray-100 space-y-4">
                <select id="manSchool"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 text-gray-700"

                    <option value="학교1(CCM)">학교1(CCM)</option>
                    <option value="학교2(Strawberry)">학교2(Strawberry)</option>
                    <option value="학교3(Ankur)">학교3(Ankur)</option>
                </select>

                <select id="manStudent"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 text-gray-700">
                    <option value="">학생 선택 (학교를 먼저 선택하세요)</option>
                </select>

                <select id="manPeriod"
                    class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400 text-gray-700"
                    onchange="toggleCustomDate()">
                    <option value="이번주">이번주</option>
                    <option value="이번달">이번달</option>
                    <option value="올해">올해</option>
                    <option value="기간지정">직접 기간 지정</option>
                </select>

                <div id="customDateContainer"
                    class="hidden flex gap-2 items-center bg-gray-50 p-3 rounded-xl border border-gray-200">
                    <input type="date" id="manStartDate"
                        class="flex-1 border-none bg-transparent text-sm focus:outline-none text-gray-700">
                    <span class="text-gray-400 font-bold">~</span>

                        class="flex-1 border-none bg-transparent text-sm focus:outline-none text-gray-700">

                <button onclick="searchAttendance()"
                    class="w-full py-3.5 bg-indigo-500 text-white font-bold rounded-xl shadow-md hover:bg-indigo-600 transition flex items-center justify-center gap-2">
                    <i class="fas fa-search"></i> 출결 조회하기
                </button>
            </div>

            <div class="p-5 flex-1 overflow-y-auto">
                <div id="studentProfileContainer"
                    class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hidden mb-6 flex flex-col items-center">
                    <div id="profileImage"
                        class="w-32 h-32 rounded-full overflow-hidden mb-4 shadow-md border-4 border-indigo-50 flex items-center justify-center bg-indigo-50 text-indigo-300">
                        <i class="fas fa-user text-5xl"></i>
                    </div>
                    <div class="text-center">
                        <p id="profileNumber" class="text-sm text-indigo-500 font-extrabold mb-1"></p>
                        <p id="profileName" class="text-2xl font-bold text-gray-800"></p>
                    </div>
                </div>

                <div id="statContainer" class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hidden mb-6">
                    <h3 class="font-bold text-gray-800 mb-4 text-center border-b border-gray-50 pb-2">출결 요약</h3>
                    <div class="flex justify-around text-center">
                        <div class="bg-green-50 w-full py-3 rounded-l-xl border-r border-white">
                            <p class="text-xs text-green-600 mb-1 font-bold">출석</p>
                            <p id="statPresent" class="text-2xl font-extrabold text-green-500">0</p>
                        </div>
                        <div class="bg-orange-50 w-full py-3 border-r border-white">
                            <p class="text-xs text-orange-600 mb-1 font-bold">지각</p>
                            <p id="statTardy" class="text-2xl font-extrabold text-orange-500">0</p>
                        </div>
                        <div class="bg-red-50 w-full py-3 rounded-r-xl">
                            <p class="text-xs text-red-600 mb-1 font-bold">결석</p>
                            <p id="statAbsent" class="text-2xl font-extrabold text-red-500">0</p>
                        </div>
                    </div>

                    <div id="statDetails" class="mt-4 space-y-2 hidden">
                        <div id="tardyList"
                            class="text-[11px] bg-orange-50 text-orange-600 p-2.5 rounded-lg hidden break-words leading-relaxed border border-orange-100">
                        </div>
                        <div id="absentList"
                            class="text-[11px] bg-red-50 text-red-600 p-2.5 rounded-lg hidden break-words leading-relaxed border border-red-100">
                        </div>
                    </div>
                </div>

                <div id="memoContainer" class="space-y-3">
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, doc, setDoc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCTwOAC_LrrKH8CKepUOTf0pyd9qRv4y_8",
            authDomain: "cnation-project.firebaseapp.com",
            projectId: "cnation-project",
            storageBucket: "cnation-project.firebasestorage.app",
            messagingSenderId: "1004154104261",
            appId: "1:1004154104261:web:0eac4c7ded38262ae5c3ac",
            measurementId: "G-7PW1NSP5EQ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const STUDENTS_COL = "cnation-goodmento-students";
        const ATTENDANCE_COL = "cnation-goodmento-attendance";

        let currentSchool = "";
        let currentStudents = [];
        let manageStudentsData = [];

        document.getElementById('attDate').value = new Date().toISOString().split('T')[0];

        function generateThumbnail(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const max_size = 200;
                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.6);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.openAttendance = (school) => {
            currentSchool = school;
            document.getElementById('attSchoolTitle').innerText = school;
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('attendanceView').classList.remove('hidden');
            loadAttendanceData();
        };

        window.openManage = () => {
            document.getElementById('homeView').classList.add('hidden');
            document.getElementById('manageView').classList.remove('hidden');

            document.getElementById('manSchool').value = "";
            document.getElementById('manStudent').innerHTML = '<option value="">학생 선택 (학교를 먼저 선택하세요)</option>';
            document.getElementById('statContainer').classList.add('hidden');
            document.getElementById('studentProfileContainer').classList.add('hidden');
            document.getElementById('memoContainer').innerHTML = '';
            toggleCustomDate();
        };

        window.goHome = () => {
            document.getElementById('attendanceView').classList.add('hidden');
            document.getElementById('manageView').classList.add('hidden');
            document.getElementById('homeView').classList.remove('hidden');
        };

        window.loadAttendanceData = async () => {
            const listContainer = document.getElementById('studentListContainer');
            const deleteSelect = document.getElementById('deleteStudentSelect');
            const editSelect = document.getElementById('editStudentSelect');

            listContainer.innerHTML = '<p class="text-center text-gray-400 py-10"><i class="fas fa-spinner fa-spin mr-2"></i>학생 목록을 불러오는 중...</p>';
            deleteSelect.innerHTML = '<option value="">삭제할 학생 선택</option>';
            editSelect.innerHTML = '<option value="">수정할 학생 선택</option>';
            document.getElementById('editStudentForm').classList.add('hidden');

            const selectedDate = document.getElementById('attDate').value;

            try {
                const studentQuery = query(collection(db, STUDENTS_COL), where("school", "==", currentSchool));
                const studentSnap = await getDocs(studentQuery);
                currentStudents = [];
                studentSnap.forEach(doc => currentStudents.push({ id: doc.id, ...doc.data() }));

                const attQuery = query(collection(db, ATTENDANCE_COL), where("school", "==", currentSchool));
                const attSnap = await getDocs(attQuery);

                const todayAttendance = {};
                attSnap.forEach(doc => {
                    const data = doc.data();
                    if (data.date === selectedDate) {
                        todayAttendance[data.studentId] = data;
                    }
                });

                listContainer.innerHTML = '';
                if (currentStudents.length === 0) {
                    listContainer.innerHTML = '<p class="text-center text-gray-400 py-10">등록된 학생이 없습니다. 아래에서 추가해주세요.</p>';
                    return;
                }

                currentStudents.sort((a, b) => a.number - b.number);

                currentStudents.forEach(student => {
                    const record = todayAttendance[student.id] || { status: '출석', memo: '' };

                    const optionHtml = `<option value="${student.id}">${student.number}번 ${student.name}</option>`;
                    deleteSelect.innerHTML += optionHtml;
                    editSelect.innerHTML += optionHtml;

                    // 리스트(출석부) 화면에서는 썸네일 이미지 로드
                    let photoHtml = student.thumbnailUrl
                        ? `<img src="${student.thumbnailUrl}" class="w-12 h-12 rounded-full object-cover shadow-sm border border-gray-100 shrink-0" alt="photo">`
                        : `<div class="w-12 h-12 rounded-full bg-pink-50 flex items-center justify-center text-pink-300 shadow-sm border border-pink-100 shrink-0"><i class="fas fa-user text-lg"></i></div>`;

                    const html = `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100" data-student-id="${student.id}">
                            <div class="flex items-center gap-3 mb-3">
                                ${photoHtml}
                                <div class="flex-1">
                                    <div class="flex items-center gap-1.5 mb-1">
                                        <span class="text-xs font-bold text-gray-400 bg-gray-50 px-1.5 py-0.5 rounded">${student.number}번</span>
                                        <span class="font-bold text-gray-800 text-lg">${student.name}</span>
                                    </div>
                                    <div class="flex bg-gray-50 rounded-lg p-1 gap-1">
                                        <label class="flex-1 text-center cursor-pointer px-1 py-1.5 rounded-md text-sm font-bold transition-colors ${record.status === '출석' ? 'bg-green-500 text-white shadow-sm' : 'text-gray-500 hover:bg-gray-200'}">
                                            <input type="radio" name="status_${student.id}" value="출석" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '출석' ? 'checked' : ''}> 출석
                                        </label>
                                        <label class="flex-1 text-center cursor-pointer px-1 py-1.5 rounded-md text-sm font-bold transition-colors ${record.status === '지각' ? 'bg-orange-500 text-white shadow-sm' : 'text-gray-500 hover:bg-gray-200'}">
                                            <input type="radio" name="status_${student.id}" value="지각" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '지각' ? 'checked' : ''}> 지각
                                        </label>
                                        <label class="flex-1 text-center cursor-pointer px-1 py-1.5 rounded-md text-sm font-bold transition-colors ${record.status === '결석' ? 'bg-red-500 text-white shadow-sm' : 'text-gray-500 hover:bg-gray-200'}">
                                            <input type="radio" name="status_${student.id}" value="결석" class="hidden" onchange="updateRadioStyle(this)" ${record.status === '결석' ? 'checked' : ''}> 결석
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <input type="text" id="memo_${student.id}" value="${record.memo}" placeholder="특이사항 메모..." class="w-full border-b border-dashed border-gray-300 py-1 text-sm text-gray-600 focus:outline-none focus:border-pink-400 bg-transparent mt-1">
                        </div>
                    `;
                    listContainer.insertAdjacentHTML('beforeend', html);
                });

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = '<p class="text-center text-red-400 py-10">데이터를 불러오는 중 오류가 발생했습니다.</p>';
            }
        };

        window.updateRadioStyle = (radio) => {
            const labels = radio.closest('div').querySelectorAll('label');
            labels.forEach(l => {
                l.className = 'flex-1 text-center cursor-pointer px-1 py-1.5 rounded-md text-sm font-bold transition-colors text-gray-500 hover:bg-gray-200';
            });

            if (radio.value === '출석') radio.parentElement.classList.add('bg-green-500', 'text-white', 'shadow-sm');
            if (radio.value === '지각') radio.parentElement.classList.add('bg-orange-500', 'text-white', 'shadow-sm');
            if (radio.value === '결석') radio.parentElement.classList.add('bg-red-500', 'text-white', 'shadow-sm');
            radio.parentElement.classList.remove('text-gray-500', 'hover:bg-gray-200');
        };

        window.addStudent = async () => {
            const numInput = document.getElementById('newStudentNum');
            const nameInput = document.getElementById('newStudentName');
            const photoInput = document.getElementById('newStudentPhoto');
            const btn = document.getElementById('addStudentBtn');
            const statusText = document.getElementById('uploadStatus');

            const number = numInput.value.trim();
            const name = nameInput.value.trim();
            const photoFile = photoInput.files[0];

            if (!number || !name) {
                alert("학생 번호와 이름을 모두 입력해주세요.");
                return;
            }

            btn.disabled = true;
            btn.classList.add('opacity-50');
            statusText.classList.remove('hidden');

            try {
                let imageUrl = "";
                let thumbnailUrl = "";

                if (photoFile) {
                    const timeStr = Date.now();
                    const originalImageRef = ref(storage, `${STUDENTS_COL}/images/${timeStr}_${photoFile.name}`);
                    await uploadBytes(originalImageRef, photoFile);
                    imageUrl = await getDownloadURL(originalImageRef);

                    const thumbnailBlob = await generateThumbnail(photoFile);
                    const thumbnailRef = ref(storage, `${STUDENTS_COL}/thumbnails/${timeStr}_${photoFile.name}.jpg`);
                    await uploadBytes(thumbnailRef, thumbnailBlob);
                    thumbnailUrl = await getDownloadURL(thumbnailRef);
                }

                await addDoc(collection(db, STUDENTS_COL), {
                    school: currentSchool,
                    number: Number(number),
                    name: name,
                    imageUrl: imageUrl, // 원본 이미지 URL
                    thumbnailUrl: thumbnailUrl, // 썸네일 이미지 URL
                    createdAt: serverTimestamp()
                });

                numInput.value = '';
                nameInput.value = '';
                photoInput.value = '';
                alert(`${name} 학생이 성공적으로 추가되었습니다!`);
                loadAttendanceData();
            } catch (error) {
                console.error(error);
                alert("학생 추가 중 오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                statusText.classList.add('hidden');
            }
        };

        window.loadStudentDataForEdit = () => {
            const select = document.getElementById('editStudentSelect');
            const form = document.getElementById('editStudentForm');
            const studentId = select.value;

            if (!studentId) {
                form.classList.add('hidden');
                return;
            }

            const student = currentStudents.find(s => s.id === studentId);
            if (student) {
                document.getElementById('editStudentNum').value = student.number || '';
                document.getElementById('editStudentName').value = student.name || '';
                document.getElementById('editStudentPhoto').value = '';
                form.classList.remove('hidden');
            }
        };

        window.updateStudent = async () => {
            const studentId = document.getElementById('editStudentSelect').value;
            if (!studentId) return;

            const numInput = document.getElementById('editStudentNum').value.trim();
            const nameInput = document.getElementById('editStudentName').value.trim();
            const photoFile = document.getElementById('editStudentPhoto').files[0];
            const btn = document.getElementById('updateStudentBtn');
            const statusText = document.getElementById('editUploadStatus');

            if (!numInput || !nameInput) {
                alert("학생 번호와 이름을 모두 입력해주세요.");
                return;
            }

            const student = currentStudents.find(s => s.id === studentId);
            if (!student) return;

            btn.disabled = true;
            btn.classList.add('opacity-50');
            statusText.classList.remove('hidden');

            try {
                let imageUrl = student.imageUrl || "";
                let thumbnailUrl = student.thumbnailUrl || "";

                if (photoFile) {
                    const timeStr = Date.now();
                    const originalImageRef = ref(storage, `${STUDENTS_COL}/images/${timeStr}_${photoFile.name}`);
                    await uploadBytes(originalImageRef, photoFile);
                    imageUrl = await getDownloadURL(originalImageRef);

                    const thumbnailBlob = await generateThumbnail(photoFile);
                    const thumbnailRef = ref(storage, `${STUDENTS_COL}/thumbnails/${timeStr}_${photoFile.name}.jpg`);
                    await uploadBytes(thumbnailRef, thumbnailBlob);
                    thumbnailUrl = await getDownloadURL(thumbnailRef);
                }

                await updateDoc(doc(db, STUDENTS_COL, studentId), {
                    number: Number(numInput),
                    name: nameInput,
                    imageUrl: imageUrl,
                    thumbnailUrl: thumbnailUrl,
                    updatedAt: serverTimestamp()
                });

                alert(`${nameInput} 학생 정보가 수정되었습니다!`);
                document.getElementById('editStudentForm').classList.add('hidden');
                document.getElementById('editStudentSelect').value = '';
                loadAttendanceData();
            } catch (error) {
                console.error(error);
                alert("정보 수정 중 오류가 발생했습니다.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50');
                statusText.classList.add('hidden');
            }
        };

        window.deleteStudent = async () => {
            const select = document.getElementById('deleteStudentSelect');
            const studentId = select.value;
            const studentName = select.options[select.selectedIndex]?.text;

            if (!studentId) {
                alert("삭제할 학생을 선택해주세요.");
                return;
            }

            if (confirm(`[${studentName}] 학생을 정말 삭제 하시겠어요? (삭제 후 복구 불가)`)) {
                try {
                    await deleteDoc(doc(db, STUDENTS_COL, studentId));
                    alert(`${studentName} 정보가 삭제되었습니다.`);
                    loadAttendanceData();
                } catch (error) {
                    console.error(error);
                    alert("삭제 중 오류가 발생했습니다.");
                }
            }
        };

        window.saveAllAttendance = async () => {
            const selectedDate = document.getElementById('attDate').value;
            if (!selectedDate) return;

            let saveCount = 0;
            try {
                for (const student of currentStudents) {
                    const statusRadio = document.querySelector(`input[name="status_${student.id}"]:checked`);
                    const memoInput = document.getElementById(`memo_${student.id}`);

                    if (statusRadio) {
                        const status = statusRadio.value;
                        const memo = memoInput.value.trim();

                        const docId = `${currentSchool}_${student.id}_${selectedDate}`;

                        await setDoc(doc(db, ATTENDANCE_COL, docId), {
                            school: currentSchool,
                            studentId: student.id,
                            date: selectedDate,
                            status: status,
                            memo: memo,
                            updatedAt: serverTimestamp()
                        });
                        saveCount++;
                    }
                }
                alert(`총 ${saveCount}명의 출석 정보가 저장되었습니다! 💾`);
            } catch (error) {
                console.error(error);
                alert("저장 중 오류가 발생했습니다.");
            }
        };

        window.toggleCustomDate = () => {
            const period = document.getElementById('manPeriod').value;
            const customDiv = document.getElementById('customDateContainer');
            if (period === '기간지정') customDiv.classList.remove('hidden');
            else customDiv.classList.add('hidden');
        };

        window.loadManageStudents = async () => {
            const school = document.getElementById('manSchool').value;
            const studentSelect = document.getElementById('manStudent');
            studentSelect.innerHTML = '<option value="">학생을 불러오는 중...</option>';
            document.getElementById('studentProfileContainer').classList.add('hidden');
            document.getElementById('statContainer').classList.add('hidden');

            if (!school) {
                studentSelect.innerHTML = '<option value="">학생 선택 (학교를 먼저 선택하세요)</option>';
                return;
            }

            try {
                const q = query(collection(db, STUDENTS_COL), where("school", "==", school));
                const snap = await getDocs(q);

                manageStudentsData = [];
                let html = '<option value="">학생을 선택하세요</option>';

                snap.forEach(doc => manageStudentsData.push({ id: doc.id, ...doc.data() }));

                manageStudentsData.sort((a, b) => a.number - b.number);
                manageStudentsData.forEach(s => html += `<option value="${s.id}">${s.number}번 ${s.name}</option>`);

                studentSelect.innerHTML = html;
            } catch (e) {
                studentSelect.innerHTML = '<option value="">불러오기 실패</option>';
            }
        };

        function getDateRange(periodStr) {
            const today = new Date();
            let start, end;

            if (periodStr === '이번주') {
                const day = today.getDay();
                const diff = today.getDate() - day + (day === 0 ? -6 : 1);
                start = new Date(today.setDate(diff));
                end = new Date(start);
                end.setDate(end.getDate() + 6);
            } else if (periodStr === '이번달') {
                start = new Date(today.getFullYear(), today.getMonth(), 1);
                end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            } else if (periodStr === '올해') {
                start = new Date(today.getFullYear(), 0, 1);
                end = new Date(today.getFullYear(), 11, 31);
            } else {
                return {
                    start: document.getElementById('manStartDate').value,
                    end: document.getElementById('manEndDate').value
                };
            }

            const offset = start.getTimezoneOffset() * 60000;
            return {
                start: (new Date(start - offset)).toISOString().split('T')[0],
                end: (new Date(end - offset)).toISOString().split('T')[0]
            };
        }

        window.searchAttendance = async () => {
            const studentId = document.getElementById('manStudent').value;
            const period = document.getElementById('manPeriod').value;
            const memoContainer = document.getElementById('memoContainer');

            if (!studentId) { alert("학생을 선택해주세요."); return; }

            const range = getDateRange(period);
            if (!range.start || !range.end) { alert("조회 기간을 정확히 입력해주세요."); return; }

            // ★ 학생 관리(상세) 메뉴에서는 원본 이미지를 크게 로드 ★
            const targetStudent = manageStudentsData.find(s => s.id === studentId);
            const profileContainer = document.getElementById('studentProfileContainer');
            const profileImgDiv = document.getElementById('profileImage');

            document.getElementById('profileNumber').innerText = `NO. ${targetStudent.number}`;
            document.getElementById('profileName').innerText = targetStudent.name;

            if (targetStudent.imageUrl) {
                // 원본 이미지 URL 사용 및 중앙 정렬 적용
                profileImgDiv.innerHTML = `<img src="${targetStudent.imageUrl}" class="w-full h-full object-cover" alt="원본 사진">`;
            } else {
                profileImgDiv.innerHTML = `<i class="fas fa-user text-5xl"></i>`;
            }
            profileContainer.classList.remove('hidden');

            document.getElementById('statContainer').classList.remove('hidden');
            document.getElementById('statDetails').classList.add('hidden');
            document.getElementById('tardyList').classList.add('hidden');
            document.getElementById('absentList').classList.add('hidden');

            memoContainer.innerHTML = '<p class="text-center text-gray-400 text-sm mt-4"><i class="fas fa-spinner fa-spin"></i> 분석 중...</p>';

            try {
                const q = query(collection(db, ATTENDANCE_COL), where("studentId", "==", studentId));
                const snap = await getDocs(q);

                let present = 0, tardy = 0, absent = 0;
                let tardyDates = [];
                let absentDates = [];
                let memos = [];

                snap.forEach(doc => {
                    const data = doc.data();
                    if (data.date >= range.start && data.date <= range.end) {
                        if (data.status === '출석') present++;
                        if (data.status === '지각') {
                            tardy++;
                            tardyDates.push(data.date);
                        }
                        if (data.status === '결석') {
                            absent++;
                            absentDates.push(data.date);
                        }

                        if (data.memo && data.memo.trim() !== '') {
                            memos.push({ date: data.date, memo: data.memo, status: data.status });
                        }
                    }
                });

                document.getElementById('statPresent').innerText = present;
                document.getElementById('statTardy').innerText = tardy;
                document.getElementById('statAbsent').innerText = absent;

                tardyDates.sort((a, b) => b.localeCompare(a));
                absentDates.sort((a, b) => b.localeCompare(a));

                const statDetails = document.getElementById('statDetails');
                const tardyList = document.getElementById('tardyList');
                const absentList = document.getElementById('absentList');

                if (tardyDates.length > 0) {
                    tardyList.innerHTML = `<span class="font-bold">🚨 지각 일자:</span> ${tardyDates.join(', ')}`;
                    tardyList.classList.remove('hidden');
                }
                if (absentDates.length > 0) {
                    absentList.innerHTML = `<span class="font-bold">❌ 결석 일자:</span> ${absentDates.join(', ')}`;
                    absentList.classList.remove('hidden');
                }
                if (tardyDates.length > 0 || absentDates.length > 0) {
                    statDetails.classList.remove('hidden');
                }

                memos.sort((a, b) => b.date.localeCompare(a.date));

                memoContainer.innerHTML = '';
                if (memos.length > 0) {
                    memos.forEach(m => {
                        const statusColor = m.status === '출석' ? 'text-green-500' : (m.status === '지각' ? 'text-orange-500' : 'text-red-500');
                        memoContainer.innerHTML += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex gap-3 items-start">
                                <div class="bg-gray-50 text-gray-500 text-xs font-bold px-2 py-1 rounded-md shrink-0 border border-gray-200">${m.date}</div>
                                <div>
                                    <span class="text-[10px] font-bold ${statusColor} bg-white px-1.5 py-0.5 rounded border mb-1 inline-block">${m.status}</span>
                                    <p class="text-sm text-gray-700 mt-1">${m.memo}</p>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    memoContainer.innerHTML = '<div class="text-center text-gray-400 text-sm py-8 bg-white rounded-xl border border-gray-100 shadow-sm">이 기간에는 작성된 특이사항 메모가 없습니다.</div>';
                }

            } catch (error) {
                console.error(error);
                memoContainer.innerHTML = '<p class="text-center text-red-400 text-sm mt-4">데이터 조회에 실패했습니다.</p>';
            }
        };

    </script>
</body>

</html>
